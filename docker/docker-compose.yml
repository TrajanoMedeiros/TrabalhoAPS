version: '3.8'

services:

  # -----------------------------------------------
  # Aplicação PHP/Laravel (php-fpm)
  # -----------------------------------------------
  app:
    build:
      context: ../apache
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../apache:/var/www/html
      - ../apache/php/php.ini:/usr/local/etc/php/conf.d/app.ini
    networks:
      - laravel_network
    depends_on:
      - db
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  # -----------------------------------------------
  # Servidor Web Nginx
  # -----------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../apache:/var/www
      - ../apache/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - app

  # -----------------------------------------------
  # Banco de Dados PostgreSQL
  # -----------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: laravel_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - /tmp/postgres_data:/var/lib/postgresql/data
      - ../tmp:/docker-entrypoint-initdb.d
    networks:
      - laravel_network

  # -----------------------------------------------
  # pgAdmin (interface visual para o banco)
  # -----------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: laravel_pgadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    networks:
      - laravel_network
    depends_on:
      - db

# -----------------------------------------------
# Volumes persistentes
# -----------------------------------------------
volumes:
  db_data:
    driver: local

# -----------------------------------------------
# Rede interna dos serviços
# -----------------------------------------------
networks:
  laravel_network:
    driver: bridge
